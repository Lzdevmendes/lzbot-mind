<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LzBot Mind</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-card">
      <div class="spinner"></div>
      <p id="loadingText">Extraindo produtos...</p>
    </div>
  </div>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <i class="fas fa-brain"></i>
        <span>LzBot <strong>Mind</strong></span>
      </div>
      <div id="aiStatusBadge" class="ai-badge"></div>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Extraia dados de <span class="highlight">qualquer loja</span></h1>
      <p class="hero-sub">Cole o link de qualquer site e a IA traz preços, tamanhos, cores e disponibilidade</p>

      <div class="url-form">
        <div class="url-input-wrap">
          <i class="fas fa-link url-icon"></i>
          <input
            type="url"
            id="urlInput"
            placeholder="https://loja.com/categoria ou produto..."
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button id="clearUrl" class="clear-btn hidden"><i class="fas fa-times"></i></button>
        </div>
        <div class="form-row">
          <select id="aiProvider" class="provider-select" style="display:none">
            <option value="auto">IA automática</option>
          </select>
          <button id="extractBtn" class="btn-extract">
            <i class="fas fa-search-dollar"></i>
            <span>Extrair</span>
          </button>
        </div>
      </div>

      <div class="quick-tips">
        <span>Funciona com:</span>
        <span class="tip-tag">Shopify</span>
        <span class="tip-tag">WooCommerce</span>
        <span class="tip-tag">Qualquer loja</span>
      </div>
    </section>

    <section id="resultsSection" class="results-section hidden">
      <div class="results-header">
        <div class="results-meta">
          <span id="resultsCount" class="results-count"></span>
          <span id="pageTitle" class="page-title"></span>
        </div>
        <button id="newSearchBtn" class="btn-new-search">
          <i class="fas fa-arrow-left"></i> Nova busca
        </button>
      </div>

      <div class="filters-bar">
        <div class="filter-group">
          <div class="search-filter">
            <i class="fas fa-search"></i>
            <input type="text" id="searchFilter" placeholder="Buscar produto...">
          </div>
        </div>

        <div class="filter-group" id="colorFilterGroup" style="display:none">
          <label>Cores</label>
          <div id="colorFilters" class="chip-group"></div>
        </div>

        <div class="filter-group" id="sizeFilterGroup" style="display:none">
          <label>Tamanhos</label>
          <div id="sizeFilters" class="chip-group"></div>
        </div>

        <div class="filter-group" id="priceFilterGroup" style="display:none">
          <label>Preço</label>
          <div class="price-range">
            <input type="number" id="minPrice" placeholder="Mín" min="0">
            <span>—</span>
            <input type="number" id="maxPrice" placeholder="Máx" min="0">
          </div>
        </div>

        <button id="clearFilters" class="btn-clear-filters hidden">
          <i class="fas fa-times"></i> Limpar filtros
        </button>
      </div>

      <div id="productsGrid" class="products-grid"></div>
    </section>

    <section id="emptyState" class="empty-state-initial hidden">
      <i class="fas fa-box-open"></i>
      <h3>Nenhum produto encontrado</h3>
      <p>A IA não encontrou produtos nesta página. Tente outra URL.</p>
    </section>
  </main>

  <div id="analysisModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3><i class="fas fa-brain"></i> Análise IA</h3>
        <button class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="analysisContent"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
